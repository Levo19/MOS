<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Turno Z · MOSexpress</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:#020817; --bg2:#0f172a; --border:#1e293b; --border2:#334155;
  --text:#e2e8f0; --muted:#64748b; --muted2:#94a3b8;
  --indigo:#6366f1; --indigo-light:#818cf8; --indigo-dim:rgba(99,102,241,0.12);
  --green:#22c55e; --green-dim:rgba(34,197,94,0.12);
  --amber:#f59e0b; --amber-dim:rgba(245,158,11,0.12);
  --red:#ef4444; --red-dim:rgba(239,68,68,0.12);
  --blue:#3b82f6; --blue-dim:rgba(59,130,246,0.12);
  --purple:#a78bfa; --purple-dim:rgba(167,139,250,0.12);
  --radius:14px; --radius-sm:10px;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding:14px; }
.glass { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); }

/* Header */
.hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:10px; flex-wrap:wrap; }
.hdr-logo { font-size:22px; font-weight:900; color:var(--indigo-light); letter-spacing:-0.5px; }
.hdr-sub  { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; margin-top:2px; }
.hdr-right { text-align:right; }
.hdr-id   { font-size:13px; font-weight:700; color:var(--text); }
.hdr-ref  { font-size:11px; color:var(--muted); margin-top:2px; }
.countdown { color:var(--indigo-light); font-weight:700; }

/* Botones */
.btn-bar { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
.btn { padding:9px 14px; border-radius:var(--radius-sm); font-size:13px; font-weight:700; cursor:pointer; border:1px solid var(--border); display:flex; align-items:center; gap:6px; white-space:nowrap; background:var(--bg2); color:var(--muted2); }
/* Update bar */
#turnoUpdateBar { display:none;position:fixed;top:0;left:0;right:0;z-index:500;background:linear-gradient(90deg,#312e81,#1e1b4b);border-bottom:1px solid rgba(99,102,241,0.5);padding:10px 16px;align-items:center;gap:10px;font-size:13px; }
.tub-msg { flex:1;font-weight:700;color:#c7d2fe; }
.tub-ver { color:#a5b4fc;font-weight:400; }
.tub-btn { padding:7px 16px;border-radius:20px;background:#6366f1;color:#fff;font-weight:800;font-size:12px;border:none;cursor:pointer;white-space:nowrap; }

.btn-wa  { background:rgba(37,211,102,0.12); color:#25d366; border-color:rgba(37,211,102,0.3); }
.btn-prt { background:var(--indigo-dim); color:var(--indigo-light); border-color:rgba(99,102,241,0.35); }

/* Print modal */
#prtOverlay { display:none;position:fixed;inset:0;background:rgba(2,8,23,0.85);z-index:200;align-items:flex-end;justify-content:center; }
#prtOverlay.open { display:flex; }
#prtSheet { background:var(--bg2);border-radius:20px 20px 0 0;border:1px solid var(--border);padding:20px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto; }
.prt-title { font-size:15px;font-weight:900;margin-bottom:4px; }
.prt-sub   { font-size:11px;color:var(--muted);margin-bottom:16px; }
.prt-zone-hdr { font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;padding:4px 10px;border-radius:20px;display:inline-block;margin:10px 0 6px; }
.prt-btn { width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;font-weight:700;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;margin-bottom:6px;transition:background .15s; }
.prt-btn:hover { background:var(--indigo-dim);border-color:rgba(99,102,241,0.4); }
.prt-btn .prt-icon { font-size:20px; }
.prt-btn .prt-name { flex:1; }
.prt-btn .prt-id   { font-size:10px;color:var(--muted);font-weight:400; }
.prt-cancel { width:100%;padding:11px;border-radius:12px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:13px;font-weight:700;cursor:pointer;margin-top:8px; }

/* Toast */
#toast { position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:700;z-index:300;transition:transform .3s,opacity .3s;opacity:0;white-space:nowrap; }
#toast.show { transform:translateX(-50%) translateY(0);opacity:1; }

/* KPI "Se debe recibir" */
.recibir-wrap { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.recibir-card { padding:18px; border-radius:var(--radius); border:1px solid; }
.recibir-label { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.1em; margin-bottom:6px; opacity:.7; }
.recibir-val   { font-size:28px; font-weight:900; line-height:1; }
.recibir-sub   { font-size:10px; margin-top:5px; opacity:.6; }
.rc-efe { background:var(--green-dim); border-color:rgba(34,197,94,0.3); }
.rc-vir { background:var(--blue-dim);  border-color:rgba(59,130,246,0.3);  }

/* Tabla resumen */
.resumen-table { width:100%; border-collapse:collapse; font-size:12px; }
.resumen-table th { padding:7px 10px; font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); text-align:left; border-bottom:1px solid var(--border); }
.resumen-table th:not(:first-child) { text-align:right; }
.resumen-table td { padding:7px 10px; border-bottom:1px solid rgba(255,255,255,0.03); }
.resumen-table td:not(:first-child) { text-align:right; font-weight:700; }
.resumen-table tfoot td { border-top:1px solid var(--border2); font-weight:800; padding-top:9px; }
.resumen-table tr:last-child td { border-bottom:none; }

/* Secciones colapsables */
.sec { margin-bottom:12px; }
.sec-hdr { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; cursor:pointer; user-select:none; border-radius:var(--radius-sm); background:var(--bg2); border:1px solid var(--border); gap:8px; }
.sec-hdr:hover { border-color:var(--border2); }
.sec-title { font-size:12px; font-weight:700; display:flex; align-items:center; gap:7px; }
.sec-badge { font-size:10px; font-weight:800; padding:2px 8px; border-radius:20px; background:var(--indigo-dim); color:var(--indigo-light); }
.sec-total { font-size:13px; font-weight:800; }
.sec-chev  { font-size:11px; color:var(--muted); transition:transform .2s; }
.sec-body  { display:none; border:1px solid var(--border); border-top:none; border-radius:0 0 var(--radius-sm) var(--radius-sm); overflow:hidden; }
.sec-body.open { display:block; }

/* Tabla genérica */
.tbl { width:100%; border-collapse:collapse; font-size:12px; }
.tbl th { padding:8px 12px; font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); background:rgba(255,255,255,0.02); border-bottom:1px solid var(--border); text-align:left; }
.tbl td { padding:8px 12px; border-bottom:1px solid rgba(255,255,255,0.03); vertical-align:middle; }
.tbl tr:last-child td { border-bottom:none; }
.tbl tr:hover td { background:rgba(255,255,255,0.02); }

/* Badges */
.badge { display:inline-block; padding:2px 7px; border-radius:4px; font-size:10px; font-weight:700; }
.b-nv  { background:rgba(99,102,241,0.15); color:var(--indigo-light); }
.b-bo  { background:rgba(34,197,94,0.12);  color:var(--green); }
.b-fa  { background:rgba(245,158,11,0.12); color:var(--amber); }
.b-an  { background:rgba(239,68,68,0.12);  color:var(--red); }
.b-cr  { background:rgba(167,139,250,0.12);color:var(--purple); }
.b-pc  { background:rgba(245,158,11,0.12); color:var(--amber); }
.b-ef  { background:rgba(34,197,94,0.12);  color:var(--green); }
.b-vir { background:rgba(59,130,246,0.12); color:var(--blue); }

/* Correlativos */
.corr-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:8px; margin-bottom:14px; }
.corr-card { padding:12px 14px; border-radius:var(--radius-sm); background:var(--bg2); border:1px solid var(--border); }
.corr-tipo { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:4px; }
.corr-val  { font-size:13px; font-weight:800; color:var(--text); }
.corr-sub  { font-size:10px; color:var(--muted); margin-top:2px; }

/* Desempeño vendedor */
.vend-row  { padding:10px 14px; border-bottom:1px solid rgba(255,255,255,0.04); }
.vend-row:last-child { border-bottom:none; }
.vend-top  { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
.vend-name { font-size:13px; font-weight:700; }
.vend-meta { font-size:10px; color:var(--muted); }
.vend-bar-wrap { height:5px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
.vend-bar { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--indigo),var(--indigo-light)); transition:width .5s; }

/* Auditorías */
.audit-row { padding:10px 14px; border-bottom:1px solid rgba(255,255,255,0.03); }
.audit-row:last-child { border-bottom:none; }
.audit-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.audit-name { font-size:12px; font-weight:700; }
.audit-cnt  { font-size:12px; font-weight:800; }
.audit-bar-wrap { height:5px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; }
.audit-bar { height:100%; border-radius:3px; transition:width .5s; }

/* Extras */
.extra-row { padding:10px 14px; border-bottom:1px solid rgba(255,255,255,0.03); }
.extra-row:last-child { border-bottom:none; }
.extra-top  { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.extra-hora { color:var(--muted); width:36px; flex-shrink:0; font-size:11px; }
.extra-concepto { flex:1; font-size:12px; font-weight:600; min-width:80px; }
.extra-monto { font-weight:800; flex-shrink:0; margin-left:auto; }

/* Ticket expandable cards */
.tk-card { border-bottom:1px solid rgba(255,255,255,0.04); }
.tk-card:last-child { border-bottom:none; }
.tk-hdr { display:flex;align-items:center;gap:7px;padding:10px 14px;cursor:pointer;user-select:none;flex-wrap:wrap;transition:background .12s; }
.tk-hdr:hover { background:rgba(255,255,255,0.03); }
.tk-corr { font-size:12px;font-weight:700;flex:1;min-width:60px; }
.tk-total { font-size:13px;font-weight:800; }
.tk-chev { font-size:11px;color:var(--muted);transition:transform .2s;flex-shrink:0; }
.tk-body { display:none;padding:10px 14px 12px;background:rgba(0,0,0,0.2);border-top:1px solid rgba(255,255,255,0.04); }
.tk-body.open { display:block; }
.tk-info-row { display:flex;align-items:baseline;gap:8px;padding:3px 0;font-size:12px;flex-wrap:wrap; }
.tk-info-lbl { font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);min-width:60px;flex-shrink:0; }
.tk-meta { font-size:11px;color:var(--muted);display:flex;flex-wrap:wrap;align-items:center;gap:3px;padding-bottom:4px; }
.tk-sep { opacity:.35;margin:0 1px; }
.tk-obs { margin-top:8px;padding:8px 10px;border-radius:8px;background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);font-size:11px;color:var(--amber);line-height:1.5; }
.tk-obs-lbl { font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--amber);opacity:.7;margin-bottom:3px; }
.tk-items { margin-top:8px;display:flex;flex-direction:column;gap:2px; }
.tk-item-row { display:flex;justify-content:space-between;align-items:baseline;gap:8px;font-size:12px;padding:2px 0; }
.tk-item-left { display:flex;align-items:baseline;gap:5px;min-width:0; }
.tk-item-cant { font-weight:800;color:var(--indigo);white-space:nowrap;font-size:11px; }
.tk-item-nom { overflow:hidden;text-overflow:ellipsis;white-space:nowrap; }
.tk-item-sub { text-align:right;white-space:nowrap;font-weight:700;font-variant-numeric:tabular-nums;flex-shrink:0; }

/* Neto box */
.neto-box { display:flex; gap:10px; padding:10px 14px; background:rgba(255,255,255,0.02); border-top:1px solid var(--border); flex-wrap:wrap; }
.neto-item { flex:1; min-width:100px; }
.neto-lbl  { font-size:9px; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:3px; }
.neto-val  { font-size:16px; font-weight:900; }

/* Spinner */
.loading { display:flex; align-items:center; justify-content:center; height:200px; flex-direction:column; gap:14px; }
.spin { width:28px; height:28px; border:2px solid var(--border); border-top-color:var(--indigo); border-radius:50%; animation:spin .7s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Sección header genérico */
.section { margin-bottom:14px; }
.sec-label { font-size:10px; font-weight:800; color:var(--indigo-light); text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border); }

/* Footer */
.footer { text-align:center; padding:20px 0 8px; font-size:11px; color:var(--muted); }

/* Print */
@media print {
  body { background:#fff; color:#000; padding:0; margin:0; }
  #root, .no-print { display:none !important; }
  #pkt  { display:block !important; }
  @page { size:80mm auto; margin:2mm; }
}
#pkt { display:none; }
#pkt-pre {
  font-family:'Courier New',Courier,monospace;
  font-size:7.5pt; line-height:1.3;
  white-space:pre;
  color:#000;
}

/* Mobile */
@media(max-width:500px) {
  .recibir-wrap { grid-template-columns:1fr; }
  .recibir-val  { font-size:24px; }
  .corr-grid    { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>
<div id="root">
  <div class="loading"><div class="spin"></div><p style="color:var(--muted);font-size:13px;">Cargando turno…</p></div>
</div>

<!-- Contenedor ticket imprimible (oculto en pantalla) -->
<div id="pkt"><pre id="pkt-pre"></pre></div>

<script>
const params    = new URLSearchParams(location.search);
const idCaja    = params.get('idCaja') || params.get('id_caja') || '';
const API_URL   = params.get('api') || '';
const autoPrint = params.get('autoprint') === '1';
const REFRESH   = 60;
let countdown = REFRESH, timer = null;

// ── Auto-update check: compara version.json con la versión embebida ──
const _TURNO_VERSION = '1.3.31';
(async function _checkVersion() {
  try {
    const r = await fetch('./version.json?t=' + Date.now(), { cache: 'no-store' });
    const v = await r.json();
    if (v.version && v.version !== _TURNO_VERSION) {
      const bar = document.getElementById('turnoUpdateBar');
      if (bar) {
        bar.querySelector('.tub-ver').textContent = 'v' + v.version;
        bar.style.display = 'flex';
      }
    }
  } catch(e) {}
  // Volver a revisar cada 2 minutos
  setTimeout(_checkVersion, 2 * 60 * 1000);
})();

const $ = id => document.getElementById(id);
const fm  = v => 'S/ ' + (parseFloat(v)||0).toFixed(2);
const fmt = v => (parseFloat(v)||0).toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});
const S   = v => 'S/ ' + fmt(v);
const pct = (a,b) => b > 0 ? Math.min(100,(a/b*100)) : 0;

if (!idCaja || !API_URL) {
  document.getElementById('root').innerHTML = `
    <div style="text-align:center;padding:80px 20px;color:var(--muted);">
      <div style="font-size:40px;margin-bottom:16px;">⚠️</div>
      <p style="font-size:14px;">Parámetros incompletos.<br>Abre este reporte desde MOS → Cajas.</p>
    </div>`;
} else {
  loadData();
}

async function loadData() {
  try {
    const url = new URL(API_URL);
    url.searchParams.set('action', 'datosTurno');
    url.searchParams.set('idCaja', idCaja);
    const r = await fetch(url.toString(), { cache:'no-store' });
    const json = await r.json();
    if (json.ok) {
      render(json.data);
      if (autoPrint) _triggerAutoPrint(json.data);
    } else renderError('GAS: ' + (json.error || 'Error desconocido'));
  } catch(e) { renderError('Sin conexión: ' + e.message); }
}

function startCountdown() {
  clearInterval(timer);
  countdown = REFRESH;
  timer = setInterval(() => {
    countdown--;
    const el = $('countdown');
    if (el) el.textContent = '0:' + String(countdown).padStart(2,'0');
    if (countdown <= 0) { loadData(); countdown = REFRESH; }
  }, 1000);
}

function whatsappShare(data) {
  const t  = data.totales, c = data.caja;
  const SEP  = '─────────────────────';
  const estaAbierto = !c.fechaCierre || c.estado === 'ABIERTA';
  const tipoL = { NOTA_DE_VENTA:'NV', BOLETA:'BOL', FACTURA:'FAC' };
  const L = [];
  const a  = s => L.push(s);
  const sp = () => a('');

  // ── 1. CABECERA ────────────────────────────────────────────────
  a(`📋 *TURNO Z — CIERRE*`);
  a(`👤 Cajero:   ${c.cajero || '—'}`);
  a(`🏪 Estación: ${c.estacion || c.zona || '—'}`);
  a(`📅 Apertura: ${c.fechaApert || '—'}`);
  a(`🔒 Cierre:   ${estaAbierto ? 'ABIERTO' : c.fechaCierre}`);
  if ((data.vendedores || []).length) {
    a(`👥 Vendedores: ${data.vendedores.join(', ')}`);
  }
  a(`🎫 Cobrados: ${data.cobrados.length}  ❌ Anulados: ${data.anulados.length}  🔁 Créditos: ${data.creditos.length}`);
  a(SEP);

  // ── 2. SE DEBE RECIBIR ─────────────────────────────────────────
  sp(); a(`💰 *SE DEBE RECIBIR*`);
  a(`💵  *${fm(t.montoFinalEfe)}*  efectivo en cajón`);
  if (t.virtualFinal > 0) a(`📲  *${fm(t.virtualFinal)}*  virtual recibido`);
  a(SEP);

  // ── 3. RESUMEN ────────────────────────────────────────────────
  sp(); a(`📊 *RESUMEN DEL TURNO*`);
  a(`Base inicial:      ${fm(c.montoInicial)}`);
  a(`Ventas efectivo:   ${fm(t.efectivo)}`);
  if (t.virtual > 0) a(`Ventas virtual:    ${fm(t.virtual)}`);
  const netoE = t.extrasIngreso - t.extrasEgreso;
  const netoV = t.extrasIngresoVirtual - t.extrasEgresoVirtual;
  if (netoE !== 0) a(`Extras efe:        ${netoE > 0 ? '+' : ''}${fm(netoE)}`);
  if (netoV !== 0) a(`Extras vir:        ${netoV > 0 ? '+' : ''}${fm(netoV)}`);
  a(`━━`);
  a(`✅ *Total efe:  ${fm(t.montoFinalEfe)}*`);
  if (t.virtualFinal > 0) a(`✅ *Total vir:  ${fm(t.virtualFinal)}*`);
  if (t.credito > 0)      a(`🔁 Crédito (pendiente): ${fm(t.credito)}`);
  a(SEP);

  // ── 4. CORRELATIVOS ───────────────────────────────────────────
  sp(); a(`🎫 *CORRELATIVOS*`);
  const ckeys = Object.keys(data.corrPorTipo || {});
  if (ckeys.length === 0) {
    a(`  Sin comprobantes emitidos`);
  } else {
    ckeys.forEach(tipo => {
      const corrs = [...data.corrPorTipo[tipo]].sort();
      const lbl = tipoL[tipo] || tipo;
      const rango = corrs.length > 1 ? `${corrs[0]} → ${corrs[corrs.length-1]}` : corrs[0];
      a(`  📄 ${lbl}: ${rango}  (${corrs.length})`);
    });
  }
  a(SEP);

  // ── 5. ANULADOS ───────────────────────────────────────────────
  sp(); a(`❌ *ANULADOS (${data.anulados.length})*`);
  if (data.anulados.length > 0) {
    data.anulados.forEach(tk => a(`  ${tk.correlativo || '—'}  −${fm(tk.total)}`));
    a(`  Total anulado: −${fm(t.anulados)}`);
  } else {
    a(`  Sin anulados`);
  }
  a(SEP);

  // ── 5b. SIN COBRAR ────────────────────────────────────────────
  if (data.sinCobrar.length > 0) {
    sp(); a(`⏳ *SIN COBRAR (${data.sinCobrar.length})*`);
    data.sinCobrar.forEach(tk => a(`  ${tk.correlativo || '—'}  ${fm(tk.total)}`));
    a(`  Total: ${fm(t.sinCobrar || 0)}`);
    a(SEP);
  }

  // ── 6. CRÉDITOS ───────────────────────────────────────────────
  sp(); a(`🔁 *CRÉDITOS PENDIENTES (${data.creditos.length})*`);
  if (data.creditos.length > 0) {
    data.creditos.forEach(tk => {
      a(`  ${tk.correlativo || '—'}  ${fm(tk.total)}${tk.obs ? '  · ' + tk.obs : ''}`);
    });
    a(`  Total: ${fm(t.credito)}`);
  } else {
    a(`  Sin créditos`);
  }
  a(SEP);

  // ── 7. EXTRAS ─────────────────────────────────────────────────
  const extraList = data.extras || [];
  sp(); a(`💸 *EXTRAS DEL TURNO (${extraList.length})*`);
  if (extraList.length > 0) {
    extraList.forEach(ex => {
      const isIng = ex.tipo.startsWith('INGRESO');
      const isVir = ex.tipo.endsWith('_VIRTUAL');
      const signo = isIng ? '➕' : '➖';
      const tag   = isVir ? '📲' : '💵';
      const desc  = [ex.concepto, ex.obs].filter(Boolean).join(' · ') || '—';
      a(`  ${signo}${tag} ${desc}  ${fm(ex.monto)}`);
    });
    if (netoE !== 0) a(`  Neto efe: ${netoE > 0 ? '+' : ''}${fm(netoE)}`);
    if (netoV !== 0) a(`  Neto vir: ${netoV > 0 ? '+' : ''}${fm(netoV)}`);
  } else {
    a(`  Sin movimientos extra`);
  }
  a(SEP);

  // ── 8. DESEMPEÑO ──────────────────────────────────────────────
  sp(); a(`🏆 *DESEMPEÑO DEL TURNO*`);
  const pKeys = Object.keys(data.pMap || {}).sort((a,b) => data.pMap[b].total - data.pMap[a].total);
  if (pKeys.length > 0) {
    pKeys.forEach(n => {
      const p = data.pMap[n];
      const pct = data.pTotal > 0 ? Math.round(p.total / data.pTotal * 100) : 0;
      const bars = Math.round(pct / 10);
      a(`  👤 ${n}`);
      a(`     ${fm(p.total)}  (${p.tks} tkt)  ${'█'.repeat(bars)}${'░'.repeat(10-bars)} ${pct}%`);
    });
    a(`  ─`);
    a(`  *Total turno: ${fm(data.pTotal)}*`);
  } else {
    a(`  Sin datos`);
  }
  a(SEP);

  // ── 9. AUDITORÍAS ─────────────────────────────────────────────
  const auditMapW = data.auditorias || {};
  const META_W    = data.metaAudit  || 30;
  const auditPersonasW = [...new Set([...Object.keys(data.pMap || {}), c.cajero].filter(Boolean))];
  sp(); a(`📋 *AUDITORÍAS DEL DÍA (meta: ${META_W})*`);
  if (auditPersonasW.length > 0) {
    auditPersonasW.forEach(n => {
      const cnt   = auditMapW[n] || 0;
      const pctW  = Math.round(cnt / META_W * 100);
      const barsW = Math.min(10, Math.round(pctW / 10));
      const icon  = cnt >= META_W ? '✅' : cnt >= 20 ? '⚠️' : '❌';
      a(`  ${icon} ${n}: ${cnt}/${META_W}  ${'█'.repeat(barsW)}${'░'.repeat(10-barsW)} ${pctW}%`);
    });
  } else {
    a(`  Sin datos`);
  }
  a(SEP);
  a(`_ProyectoMOS · ${new Date().toLocaleString('es-PE')}_`);

  const txt = L.join('\n');
  window.location.href = 'whatsapp://send?text=' + encodeURIComponent(txt);
  setTimeout(() => {
    if (document.hasFocus()) window.open('https://wa.me/?text=' + encodeURIComponent(txt), '_blank');
  }, 1800);
}

function toggleSec(id) {
  const body = $(id);
  const chev = $('chev-' + id);
  if (!body) return;
  const open = body.classList.toggle('open');
  if (chev) chev.style.transform = open ? 'rotate(180deg)' : '';
}

function toggleTk(id) {
  const body = $('tkb-' + id);
  const chev = $('tkc-' + id);
  if (!body) return;
  const open = body.classList.toggle('open');
  if (chev) chev.style.transform = open ? 'rotate(180deg)' : '';
}

function parseMetodo(metodo) {
  const m = String(metodo || '').toUpperCase();
  if (m === 'EFECTIVO')    return { label:'Efectivo',    cls:'b-ef',  detail: null };
  if (m === 'CREDITO')     return { label:'Crédito',     cls:'b-cr',  detail: null };
  if (m === 'POR_COBRAR')  return { label:'Por cobrar',  cls:'b-pc',  detail: null };
  if (m === 'ANULADO')     return { label:'Anulado',     cls:'b-an',  detail: null };
  if (m.startsWith('MIXTO')) {
    const eM = m.match(/EFE:([\d.]+)/), vM = m.match(/VIR:([\d.]+)/);
    const efe = eM ? parseFloat(eM[1]) : 0, vir = vM ? parseFloat(vM[1]) : 0;
    return { label:'Mixto', cls:'b-vir',
      detail: `<span class="badge b-ef" style="font-size:9px;">💵 ${fm(efe)}</span> + <span class="badge b-vir" style="font-size:9px;">📲 ${fm(vir)}</span>` };
  }
  return { label: metodo, cls:'b-vir', detail: null };
}

const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function ticketDetailHtml(tk, alwaysObs) {
  const obsRaw = tk.obs ? tk.obs.trim() : '';
  const hasObs = obsRaw.length > 0;
  const parts = [];
  if (tk.hora)       parts.push(esc(tk.hora));
  if (tk.vendedor)   parts.push(esc(tk.vendedor));
  if (tk.clienteNom) parts.push(esc(tk.clienteNom));
  if (tk.clienteDoc) parts.push(`<span style="opacity:.6">${esc(tk.clienteDoc)}</span>`);
  const metaHtml = parts.length
    ? `<div class="tk-meta">${parts.join('<span class="tk-sep">·</span>')}</div>`
    : '';
  const obsHtml = (alwaysObs || hasObs)
    ? `<div class="tk-obs"><div class="tk-obs-lbl">Comentario</div>${hasObs ? esc(obsRaw) : '<em style="opacity:.5">Sin comentarios</em>'}</div>`
    : '';
  const itemsHtml = tk.items && tk.items.length > 0
    ? `<div class="tk-items">${tk.items.map(it => {
        const nom = esc(it.nombre) || esc(it.sku);
        return `<div class="tk-item-row">
          <span class="tk-item-left"><span class="tk-item-cant">${it.cantidad}×</span><span class="tk-item-nom">${nom}</span></span>
          <span class="tk-item-sub">${fm(it.subtotal)}</span>
        </div>`;
      }).join('')}</div>`
    : '';
  return metaHtml + obsHtml + itemsHtml;
}

function ticketCard(tk, idx, prefix, color, alwaysObs) {
  const id = prefix + idx;
  const mp = parseMetodo(tk.metodo);
  return `<div class="tk-card">
    <div class="tk-hdr" onclick="toggleTk('${id}')">
      <span class="tk-corr">${tk.correlativo || '—'}</span>
      ${badgeDoc(tk.tipoDoc)}
      <span class="badge ${mp.cls}">${mp.label}</span>
      <span class="tk-total" style="color:${color};">${fm(tk.total)}</span>
      <span class="tk-chev" id="tkc-${id}">▾</span>
    </div>
    <div class="tk-body" id="tkb-${id}">${ticketDetailHtml(tk, alwaysObs)}</div>
  </div>`;
}

function badgeDoc(tipoDoc) {
  const map = { 'NOTA_DE_VENTA':'b-nv','BOLETA':'b-bo','FACTURA':'b-fa' };
  const lbl = { 'NOTA_DE_VENTA':'NV','BOLETA':'Bol','FACTURA':'Fac' };
  const cls = map[tipoDoc] || 'b-nv';
  return `<span class="badge ${cls}">${lbl[tipoDoc]||tipoDoc}</span>`;
}

function metodoBadge(metodo) {
  const m = String(metodo||'').toUpperCase();
  if (m === 'EFECTIVO')   return `<span class="badge b-ef">Efectivo</span>`;
  if (m === 'CREDITO')    return `<span class="badge b-cr">Crédito</span>`;
  if (m === 'POR_COBRAR') return `<span class="badge b-pc">Por cobrar</span>`;
  if (m === 'ANULADO')    return `<span class="badge b-an">Anulado</span>`;
  if (m.startsWith('MIXTO')) return `<span class="badge b-vir">Mixto</span>`;
  return `<span class="badge b-vir">${metodo}</span>`;
}

      <div class="sec-title">⏳ Sin cobrar <span class="sec-badge" style="background:var(--amber-dim);color:var(--amber);">${sinCobrar.length}</span></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="sec-total" style="color:var(--amber);">${sinCobrar.length > 0 ? fm(t.sinCobrar) : '—'}</span>
        <span class="sec-chev" id="chev-sec-sincobrar">▾</span>
      </div>
    </div>
    <div class="sec-body" id="sec-sincobrar">${sinCobrarHtml}</div>
  </div>

  ${creditos.length > 0 ? `
  <div class="sec">
    <div class="sec-hdr" onclick="toggleSec('sec-creditos')">
      <div class="sec-title">🔁 Créditos <span class="sec-badge" style="background:var(--purple-dim);color:var(--purple);">${creditos.length}</span></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="sec-total" style="color:var(--purple);">${fm(t.credito)}</span>
        <span class="sec-chev" id="chev-sec-creditos">▾</span>
      </div>
    </div>
    <div class="sec-body" id="sec-creditos">${creditosHtml}</div>
  </div>` : ''}

  <!-- Extras -->
  <div class="sec">
    <div class="sec-hdr" onclick="toggleSec('sec-extras')">
      <div class="sec-title">💰 Extras del turno <span class="sec-badge">${extras.length}</span></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="sec-total" style="color:${netoEfe>=0?'var(--green)':'var(--red)'};">${extras.length > 0 ? (netoEfe>=0?'+':'')+fm(netoEfe) : '—'}</span>
        <span class="sec-chev" id="chev-sec-extras">▾</span>
      </div>
    </div>
    <div class="sec-body" id="sec-extras">${extrasListHtml}${extrasNetoHtml}</div>
  </div>

  <!-- Desempeño vendedores -->
  <div class="sec">
    <div class="sec-hdr" onclick="toggleSec('sec-vend')">
      <div class="sec-title">👤 Desempeño del turno <span class="sec-badge">${pKeys.length}</span></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="sec-total">${fm(pTotal)}</span>
        <span class="sec-chev" id="chev-sec-vend">▾</span>
      </div>
    </div>
    <div class="sec-body open" id="sec-vend" style="background:var(--bg2);">${vendHtml}</div>
  </div>

  <!-- Auditorías del día -->
  <div class="sec">
    <div class="sec-hdr" onclick="toggleSec('sec-audit')">
      <div class="sec-title">📋 Auditorías del día <span class="sec-badge">meta: ${META_AUD}</span></div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="sec-total" style="font-size:11px;color:var(--muted);">${auditPersonas.filter(n=>(auditMap[n]||0)>=META_AUD).length}/${auditPersonas.length} cumplieron</span>
        <span class="sec-chev" id="chev-sec-audit">▾</span>
      </div>
    </div>
    <div class="sec-body open" id="sec-audit" style="background:var(--bg2);">${auditHtml}</div>
  </div>

  <div class="footer no-print">
    MOSexpress · ${caja.idCaja} · Generado ${new Date().toLocaleString('es-PE')}
  </div>`;

  buildPrintTicket(data);
  startCountdown();
}

function buildPrintTicket(data) {
  const pre = document.getElementById('pkt-pre');
  if (!pre) return;
  const { caja, cobrados, anulados, sinCobrar, creditos, extras,
          corrPorTipo, vendedores, pMap, pTotal, totales } = data;
  const t = totales;
  const W = 48;

  const dbl = () => '='.repeat(W);
  const sep = () => '-'.repeat(W);
  const ctr = s => { const p = Math.max(0,Math.floor((W-s.length)/2)); return ' '.repeat(p)+s; };
  const lr  = (l,r) => { r=String(r); const sp=Math.max(1,W-l.length-r.length); return l+' '.repeat(sp)+r; };
  const sHdr = title => { const s=' '+title+' '; const l=Math.max(0,Math.floor((W-s.length)/2)); return '='.repeat(l)+s+'='.repeat(Math.max(0,W-s.length-l)); };
  const amtS = v => 'S/'+Math.abs(parseFloat(v)||0).toFixed(2);
  const estaAbierto = !caja.fechaCierre || caja.estado==='ABIERTA';
  const tipoL = {'NOTA_DE_VENTA':'NV','BOLETA':'BOL','FACTURA':'FAC'};

  // Separar extras efe vs virtual
  const extEfe = extras.filter(e => !e.tipo.endsWith('_VIRTUAL'));
  const extVir = extras.filter(e =>  e.tipo.endsWith('_VIRTUAL'));
  const tEntradas = extEfe.filter(e=>e.tipo==='INGRESO').reduce((s,e)=>s+e.monto,0);
  const tSalidas  = extEfe.filter(e=>e.tipo==='EGRESO' ).reduce((s,e)=>s+e.monto,0);
  const tVirIng   = extVir.filter(e=>e.tipo.startsWith('INGRESO')).reduce((s,e)=>s+e.monto,0);
  const tVirEgr   = extVir.filter(e=>e.tipo.startsWith('EGRESO') ).reduce((s,e)=>s+e.monto,0);
  const netoEfe   = t.extrasIngreso - t.extrasEgreso;
  const netoVir   = t.extrasIngresoVirtual - t.extrasEgresoVirtual;

  const pKeys = Object.keys(pMap).sort((a,b)=>pMap[b].total-pMap[a].total);

  const L = [];
  const a = s => L.push(s);

  // ── PARTE 1: CABECERA ─────────────────────────────────────────
  a(dbl()); a(ctr('MOSexpress')); a(ctr('CIERRE DE TURNO (Z)')); a(dbl());
  a(lr('CAJERO  :', String(caja.cajero||'---')));
  a(lr('ESTACION:', String(caja.estacion||caja.zona||'---')));
  a(lr('APERTURA:', String(caja.fechaApert||'---')));
  a(lr('CIERRE  :', estaAbierto ? 'ABIERTO' : String(caja.fechaCierre)));
  a(sep());
  if ((vendedores||[]).length > 0) {
    a('VENDEDORES A CARGO:');
    vendedores.forEach(v => a('  + '+v));
  }
  a(lr('TICKETS COBRADOS :', String(cobrados.length)));
  a(lr('ANULADOS         :', String(anulados.length)));
  a(lr('CREDITOS (c/p)   :', String(creditos.length)));

  // ── PARTE 2: SE DEBE RECIBIR ───────────────────────────────────
  a(dbl()); a(''); a(ctr('-- SE DEBE RECIBIR --')); a('');
  a(ctr('S/'+(parseFloat(t.montoFinalEfe)||0).toFixed(2)));
  a(ctr('EFECTIVO EN CAJON')); a('');
  if (t.virtualFinal > 0) {
    a(sep()); a(ctr('VIRTUAL RECIBIDO:'));
    a(ctr('S/'+(parseFloat(t.virtualFinal)||0).toFixed(2))); a('');
  }

  // ── PARTE 3: RESUMEN ──────────────────────────────────────────
  a(sHdr('RESUMEN DEL TURNO'));
  const C1=14,C2=9,C3=9;
  const sRow = (lbl,e,v) => {
    const es=(parseFloat(e)||0)!==0?amtS(e):'---';
    const vs=(parseFloat(v)||0)!==0?amtS(v):'---';
    return lbl.padEnd(C1)+es.padStart(C2)+vs.padStart(C3);
  };
  a('CONCEPTO'.padEnd(C1)+'EFECTIVO'.padStart(C2)+'VIRTUAL'.padStart(C3));
  a(sep());
  a(sRow('Base inicial',  caja.montoInicial, 0));
  a(sRow('Ventas cobradas', t.efectivo, t.virtual));
  if (netoEfe!==0||netoVir!==0) a(sRow('Extras neto', netoEfe, netoVir));
  a(sep());
  a(sRow('EFECTIVO FINAL', t.montoFinalEfe, t.virtualFinal));
  if (t.credito>0) a('  +Credito pend.: '+amtS(t.credito));

  // ── PARTE 4: CORRELATIVOS ────────────────────────────────────
  a(sHdr('CORRELATIVOS DEL TURNO'));
  const ckeys = Object.keys(corrPorTipo);
  if (ckeys.length===0) {
    a('  Sin comprobantes emitidos en este turno');
  } else {
    ckeys.forEach(tipo => {
      const corrs=[...corrPorTipo[tipo]].sort();
      a((tipoL[tipo]||tipo).padEnd(9)+': '+corrs[0]);
      if (corrs.length>1) a('           a: '+corrs[corrs.length-1]);
      a('  Total: '+corrs.length+' comprobante'+(corrs.length!==1?'s':''));
    });
  }

  // ── PARTE 5: ANULADOS ────────────────────────────────────────
  a(sHdr('ANULADOS ('+anulados.length+')'));
  if (anulados.length>0) {
    a('CORRELATIVO'.padEnd(20)+'MONTO'.padStart(W-20)); a(sep());
    anulados.forEach(tk => a((tk.correlativo||'---').padEnd(20)+('-'+amtS(tk.total)).padStart(W-20)));
    a(sep());
    a(lr('TOTAL ANULADO', '-'+amtS(t.anulados)));
  } else { a('  Sin anulados en este turno'); }

  // ── PARTE 5b: SIN COBRAR ────────────────────────────────────
  if (sinCobrar.length>0) {
    a(sHdr('SIN COBRAR ('+sinCobrar.length+')'));
    sinCobrar.forEach(tk => a((tk.correlativo||'---').padEnd(20)+amtS(tk.total).padStart(W-20)));
    a(sep());
    a(lr('TOTAL SIN COBRAR', amtS(t.sinCobrar||0)));
  }

  // ── PARTE 6: CRÉDITOS ────────────────────────────────────────
  a(sHdr('CREDITOS PENDIENTES ('+creditos.length+')'));
  if (creditos.length>0) {
    creditos.forEach(tk => {
      a((tk.correlativo||'---').padEnd(20)+amtS(tk.total).padStart(W-20));
      if (tk.obs && tk.obs.trim()) a('  A: '+tk.obs.substring(0,W-5));
    });
    a(sep());
    a(lr('TOTAL CREDITO', amtS(t.credito)));
    a('  ** No incluido en caja -- deuda pendiente');
  } else { a('  Sin creditos otorgados en este turno'); }

  // ── PARTE 7: EXTRAS ──────────────────────────────────────────
  a(sHdr('EXTRAS DEL TURNO ('+extras.length+')'));
  if (extras.length>0) {
    extras.forEach(ex => {
      const isIng=ex.tipo.startsWith('INGRESO');
      const isVir=ex.tipo.endsWith('_VIRTUAL');
      const pfx=(isIng?'+':'-')+(isVir?'[VIR]':'[EFE]')+' ';
      const monto=amtS(ex.monto);
      const maxC=W-pfx.length-monto.length-1;
      a(pfx+(ex.concepto||'').substring(0,maxC).padEnd(maxC)+' '+monto);
    });
    a(sep());
    if (tEntradas>0) a(lr('+ INGRESOS EFE', amtS(tEntradas)));
    if (tSalidas >0) a(lr('- EGRESOS EFE',  amtS(tSalidas)));
    if (tVirIng  >0) a(lr('+ INGRESOS VIR', amtS(tVirIng)));
    if (tVirEgr  >0) a(lr('- EGRESOS VIR',  amtS(tVirEgr)));
    a(sep());
    a(lr('  NETO EFE', amtS(netoEfe)));
    if (tVirIng>0||tVirEgr>0) a(lr('  NETO VIR', amtS(netoVir)));
  } else { a('  Sin movimientos extra en este turno'); }

  // ── PARTE 8: DESEMPEÑO ───────────────────────────────────────
  a(sHdr('DESEMPENO DEL TURNO'));
  if (pKeys.length>0) {
    a('VENDEDOR'.padEnd(17)+'TKS'.padStart(4)+' '+'TOTAL'.padStart(W-22));
    a(sep());
    pKeys.forEach(n => {
      const p=pMap[n]; const fill=pTotal>0?Math.round(p.total/pTotal*22):0;
      a(n.substring(0,17).padEnd(17)+String(p.tks).padStart(4)+' '+amtS(p.total).padStart(W-22));
      a('  ['+'#'.repeat(fill)+'-'.repeat(Math.max(0,22-fill))+'] '+
        (pTotal>0?Math.round(p.total*100/pTotal):0)+'%');
    });
    a(sep());
    a(lr('TOTAL TURNO', amtS(pTotal)));
  } else { a('  Sin datos de vendedores en este turno'); }

  // ── PARTE 8b: AUDITORÍAS ──────────────────────────────────────
  const auditMapP = data.auditorias || {};
  const META_P    = data.metaAudit  || 30;
  const auditPersonasP = [...new Set([...Object.keys(pMap), caja.cajero].filter(Boolean))];
  if (auditPersonasP.length > 0) {
    a(sHdr('AUDITORIAS DEL DIA (META:'+META_P+')'));
    a('VENDEDOR'.padEnd(W-14)+'AUDIT'.padStart(7)+'ESTADO'.padStart(7));
    a(sep());
    auditPersonasP.forEach(n => {
      const cnt   = auditMapP[n] || 0;
      const estado = cnt >= META_P ? 'CUMPLE' : cnt >= 20 ? 'PARCIAL' : 'FALTA ';
      const fill  = Math.round(Math.min(cnt, META_P) / META_P * 20);
      a(n.substring(0, W-14).padEnd(W-14) + (cnt+'/'+META_P).padStart(7) + estado.padStart(7));
      a('  [' + '#'.repeat(fill) + '-'.repeat(20-fill) + '] ' + Math.round(cnt/META_P*100) + '%');
    });
  }

  // ── PIE ──────────────────────────────────────────────────────
  a(dbl()); a(ctr('*** FIN DE TURNO ***'));
  a(ctr('ProyectoMOS'));
  a(ctr(new Date().toLocaleString('es-PE')));
  a(dbl());

  pre.textContent = L.join('\n');
}

// ── Zone color palette ────────────────────────────────────────
const ZONE_PALETTE = [
  { bg:'rgba(99,102,241,0.15)', color:'#818cf8', border:'rgba(99,102,241,0.4)' },
  { bg:'rgba(34,197,94,0.12)',  color:'#4ade80', border:'rgba(34,197,94,0.35)' },
  { bg:'rgba(245,158,11,0.12)', color:'#fbbf24', border:'rgba(245,158,11,0.35)' },
  { bg:'rgba(239,68,68,0.12)',  color:'#f87171', border:'rgba(239,68,68,0.35)' },
  { bg:'rgba(167,139,250,0.12)',color:'#c4b5fd', border:'rgba(167,139,250,0.35)' },
];

function openPrintModal() {
  const data = window._turnoData;
  if (!data) return;
  const impresoras = data.impresoras || [];
  const list = document.getElementById('prtList');
  if (!impresoras.length) {
    list.innerHTML = '<p style="color:var(--muted);font-size:12px;text-align:center;padding:20px 0;">No hay impresoras activas configuradas.<br>Revisa la hoja IMPRESORAS en ProyectoMOS.</p>';
  } else {
    // Group by zone
    const zones = {};
    impresoras.forEach(p => {
      const z = p.zona || 'Sin zona';
      if (!zones[z]) zones[z] = [];
      zones[z].push(p);
    });
    let html = '';
    const zKeys = Object.keys(zones);
    zKeys.forEach((z, zi) => {
      const pal = ZONE_PALETTE[zi % ZONE_PALETTE.length];
      html += `<div class="prt-zone-hdr" style="background:${pal.bg};color:${pal.color};border:1px solid ${pal.border};">${esc(z)}</div>`;
      zones[z].forEach(p => {
        html += `<button class="prt-btn" onclick="doPrint('${esc(p.printNodeId)}')">
          <span class="prt-icon">🖨</span>
          <span class="prt-name">${esc(p.nombre)}</span>
          <span class="prt-id">${esc(p.estacion || '')}</span>
        </button>`;
      });
    });
    list.innerHTML = html;
  }
  document.getElementById('prtOverlay').classList.add('open');
}

function closePrintModal() {
  document.getElementById('prtOverlay').classList.remove('open');
}

async function doPrint(printNodeId) {
  closePrintModal();
  showToast('⏳ Enviando a impresora…', 'info');
  try {
    const url = new URL(API_URL);
    url.searchParams.set('action', 'imprimirTicketZCierre');
    url.searchParams.set('idCaja', idCaja);
    url.searchParams.set('printerId', printNodeId);
    const r = await fetch(url.toString(), { cache:'no-store' });
    const json = await r.json();
    if (json.ok) {
      showToast('✅ Ticket enviado a imprimir', 'ok');
    } else {
      showToast('❌ ' + (json.error || 'Error al imprimir'), 'err');
    }
  } catch(e) {
    showToast('❌ Error de red: ' + e.message, 'err');
  }
}

function _triggerAutoPrint(data) {
  const impresoras  = data.impresoras || [];
  const estacionCaja = (data.caja && data.caja.estacion) ? data.caja.estacion : '';
  const imp = impresoras.find(function(p) { return p.estacion === estacionCaja; });
  if (imp && imp.printNodeId) {
    setTimeout(function() { doPrint(imp.printNodeId); }, 800);
  }
}

let _toastTimer = null;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = type === 'ok' ? 'rgba(34,197,94,0.5)' : type === 'err' ? 'rgba(239,68,68,0.5)' : 'var(--border)';
  el.style.color = type === 'ok' ? '#4ade80' : type === 'err' ? '#f87171' : 'var(--text)';
  el.classList.add('show');
  if (_toastTimer) clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}

function renderError(msg) {
  document.getElementById('root').innerHTML = `
  <div style="text-align:center;padding:80px 20px;color:var(--muted);">
    <div style="font-size:40px;margin-bottom:16px;">⚠️</div>
    <p style="font-size:14px;">${msg}</p>
    <button onclick="loadData()" style="margin-top:20px;padding:10px 24px;background:var(--indigo-dim);border:1px solid var(--border);border-radius:10px;color:var(--text);cursor:pointer;font-size:14px;">
      Reintentar
    </button>
  </div>`;
}
</script>

    <div id="prtList"></div>
    <button class="prt-cancel" onclick="closePrintModal()">Cancelar</button>
  </div>
</div>

<div id="toast"></div>
